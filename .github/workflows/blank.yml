name: OLD_GooseRelayVPN (manual update)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Run GooseRelayVPN server setup (based on user script)
        run: |
          # The script expects to run as root (GitHub runner can use sudo)
          set -e

          TUNNEL_KEY="$(openssl rand -hex 32)"
          echo "TUNNEL_KEY=$TUNNEL_KEY" >> $GITHUB_ENV

          # Download and install goose-server
          LATEST_VERSION=$(curl -s https://api.github.com/repos/kianmhz/GooseRelayVPN/releases/latest | jq -r .tag_name)
          DOWNLOAD_URL="https://github.com/kianmhz/GooseRelayVPN/releases/download/${LATEST_VERSION}/GooseRelayVPN-server-${LATEST_VERSION}-linux-amd64.tar.gz"
          curl -L -o server.tar.gz "$DOWNLOAD_URL"
          tar -xzf server.tar.gz
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "GooseRelayVPN-server-*" | head -1)
          cd "$EXTRACTED_DIR"
          chmod +x goose-server
          sudo mv goose-server /usr/local/bin/

          # Create config
          sudo mkdir -p /etc/goose-relay
          sudo tee /etc/goose-relay/server_config.json > /dev/null <<EOF
          {
            "server_host": "0.0.0.0",
            "server_port": 8443,
            "tunnel_key": "$TUNNEL_KEY"
          }
          EOF

          # Start goose-server in background
          sudo /usr/local/bin/goose-server -config /etc/goose-relay/server_config.json &
          sleep 3

          # Install bore
          BORE_URL="https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$BORE_URL" | sudo tar -xz -C /usr/local/bin bore
          sudo chmod +x /usr/local/bin/bore

          # Start bore and capture its log
          mkdir -p /tmp/bore-logs
          sudo /usr/local/bin/bore local 8443 --to bore.pub > /tmp/bore-logs/bore.log 2>&1 &
          BORE_PID=$!
          echo $BORE_PID > /tmp/bore.pid

          # Wait for bore to output the public URL
          echo "Waiting for bore to provide a public URL..."
          PUBLIC_URL=""
          for i in {1..60}; do
            sleep 1
            PORT=$(grep -oP '(?:listening at bore\.pub:|remote_port=)\K[0-9]+' /tmp/bore-logs/bore.log | head -1)
            if [ -n "$PORT" ]; then
              PUBLIC_URL="http://bore.pub:${PORT}/tunnel"
              break
            fi
          done

          # Save results to files
          echo "$PUBLIC_URL" > bore_url.txt
          echo "$TUNNEL_KEY" > tunnel_key.txt

          # Print for manual copying
          echo "======================================"
          echo "✅ Tunnel created!"
          echo "Bore URL: $PUBLIC_URL"
          echo "Tunnel key: $TUNNEL_KEY"
          echo "======================================"
          echo "Manually update your Google Apps Script RELAY_URL to: $PUBLIC_URL"
          echo "Then redeploy the script."
          echo "In your client_config.json, set tunnel_key to the above key."
          echo "======================================"

          # Keep the workflow alive (infinite loop) so the tunnel stays up
          while true; do
            sleep 60
            echo "Heartbeat: $(date) - tunnel still alive"
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "Bore died, restarting..."
              sudo /usr/local/bin/bore local 8443 --to bore.pub > /tmp/bore-logs/bore.log 2>&1 &
              BORE_PID=$!
              echo $BORE_PID > /tmp/bore.pid
            fi
          done

      - name: Upload bore URL and tunnel key
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goose-bore-info
          path: |
            bore_url.txt
            tunnel_key.txt
